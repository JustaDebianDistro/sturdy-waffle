# ===========================================
#               UNSC-DRESDEN
#          simple Halo style theme
#      GENERAL SETTINGS & DECORATION
# ===========================================

source = colors.conf
source = animation.conf

general {
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    col.active_border = $blade-green $hud-cyan 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0

    shadow {
        enabled = true
        range = 12
        render_power = 2
        color = rgba(00000066)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

